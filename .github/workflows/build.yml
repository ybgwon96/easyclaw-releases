name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.14)'
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ybgwon96/easyclaw
          token: ${{ secrets.SOURCE_TOKEN }}
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:mac-local
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.tag }}"
          gh release create "$tag" --repo ybgwon96/easyclaw-releases --title "$tag" --notes "https://easyclaw.kr" 2>/dev/null || true
          gh release upload "$tag" --repo ybgwon96/easyclaw-releases dist/*.dmg --clobber

  build-win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ybgwon96/easyclaw
          token: ${{ secrets.SOURCE_TOKEN }}
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:win-local

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          gh release create "$tag" --repo ybgwon96/easyclaw-releases --title "$tag" --notes "https://easyclaw.kr" 2>/dev/null || true
          gh release upload "$tag" --repo ybgwon96/easyclaw-releases dist/*-setup.exe --clobber
